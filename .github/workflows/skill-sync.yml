name: skill sync

on:
  push:
    paths:
      - "skills/**/SKILL.md"
      - "AGENTS.md"
      - "bin/check-skill-sync.sh"
  pull_request:
    paths:
      - "skills/**/SKILL.md"
      - "AGENTS.md"
      - "bin/check-skill-sync.sh"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check skill consistency
        run: bash bin/check-skill-sync.sh
